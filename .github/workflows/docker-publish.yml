name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Führt den Workflow aus, wenn du auf 'main' pushst

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Das wird automatisch staglech/f1reactionservice

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Nutzt einen temporären Schlüssel für den Push

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest